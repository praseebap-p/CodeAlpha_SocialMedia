<!DOCTYPE html>
<html>
<head>
    <title>CodeAlpha Social</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        nav { background: #1877f2; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        nav .logo { color: white; font-size: 22px; font-weight: bold; }
        .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .btn { background: #1877f2; color: white; padding: 8px 18px; border: none; cursor: pointer; text-decoration: none; display: inline-block; border-radius: 5px; font-size: 14px; }
        .btn:hover { background: #1558b0; }
        .btn-red { background: #e74c3c; }
        .btn-red:hover { background: #c0392b; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav>
        <span class="logo">📘 CodeAlpha Social</span>
        <div>
            <a href="/">Home</a>
            {% if user.is_authenticated %}
                <a href="/post/create/">+ Post</a>
                <a href="/profile/{{ user.username }}/">Profile</a>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
                <a href="/register/">Register</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
